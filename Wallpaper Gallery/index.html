<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toro Wallpaper Gallery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <img
      src="images/toro-head.png"
      class="toro-deco toro-top-left"
      alt="Toro"
    />

    <img
      src="images/toro-sitting.png"
      class="toro-deco toro-bottom-left"
      alt="Toro"
    />

    <header class="hero">
      <button id="darkModeToggle" class="dark-mode-btn">🌙</button>
      <img src="images/Toro1.jpg" class="hero-toro" alt="Toro Inoue" />
      <h1>🐱 Toro Wallpaper Gallery</h1>
      <p>Collect your favourite Toro Inoue moments.</p>
    </header>

    <div class="quote-box"><p id="quoteText"></p></div>

    <div class="controls">
      <input type="text" id="searchInput" placeholder="Cari wallpaper..." />
      <div id="colorFilter" class="color-filter"></div>
    </div>

    <div id="gallery"></div>
    <div id="floatingEmojis"></div>

    <div id="previewModal" class="modal">
      <img id="modalImage" alt="Preview" />
    </div>

    <div class="music-player">
      <div class="player-content">
        <div class="player-info">
          <span class="song-title">Now Playing</span>
          <span class="artist-name">Loading...</span>
        </div>

        <div class="player-controls">
          <button class="player-btn" id="prevBtn">⏮</button>
          <button class="player-btn play-btn" id="playBtn">▶</button>
          <button class="player-btn" id="nextBtn">⏭</button>
        </div>

        <div class="player-progress">
          <span class="current-time">0:00</span>
          <input
            type="range"
            class="progress-bar"
            id="progressBar"
            min="0"
            max="100"
            value="0"
          />
          <span class="duration-time">0:00</span>
        </div>

        <div class="player-volume">
          <span>🔊</span>
          <input
            type="range"
            class="volume-slider"
            id="volumeSlider"
            min="0"
            max="100"
            value="70"
          />
        </div>
      </div>
    </div>

    <audio id="audioPlayer"></audio>

    <script src="script.js"></script>
  </body>
</html>
